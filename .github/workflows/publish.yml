name: Publish to Quartz

on:
  push:
    branches:
      - v4
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Quartz with submodules
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'
          token: ${{ secrets.PERSONAL_TOKEN }}
          
      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global url."https://${{ secrets.PERSONAL_TOKEN }}@github.com/".insteadOf "https://github.com/"
          
      - name: Update and sync content
        run: |
          git submodule update --remote
          git add .
          git diff --staged --quiet || git commit -m "Update obsidian content"
          git push
          
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install
          
      - name: Build Site
        run: npx quartz build
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          publish_branch: gh-pages
          publish_dir: ./public 